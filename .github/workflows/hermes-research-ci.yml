name: Hermes Research CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_major_audit:
        description: "Run the release-only source audit"
        required: true
        default: false
        type: boolean
      major_version:
        description: "Major release version, for example 2.0.0"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  vnext-security-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TMPDIR: /tmp
      TEMP: /tmp
      TMP: /tmp
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements/core.hashed.lock
            requirements/vectorbt.hashed.lock

      - name: Install exact hashed core lock
        run: python -m pip install --require-hashes -r requirements/core.hashed.lock

      - name: Install isolated vectorbt lock
        run: |
          python -m venv .venv_vectorbt
          .venv_vectorbt/bin/python -m pip install --require-hashes -r requirements/vectorbt.hashed.lock

      - name: Dependency, license, secret and Broker-boundary gate
        env:
          PYTHONPATH: commands
        run: python commands/vnext_ci_gate.py --root .

      - name: Optional release-only source audit
        if: github.event_name == 'workflow_dispatch' && inputs.run_major_audit == true
        env:
          PYTHONPATH: commands
        run: >-
          python commands/hermes_cli.py audit:code
          --major-version "${{ inputs.major_version }}"
          --profile security --scope compare --base origin/main

      - name: VNext security, contract and integration tests
        env:
          PYTHONPATH: commands
          TMPDIR: /tmp
        run: >-
          pytest
          --basetemp=/tmp/hermes-vnext-ci
          --junitxml=artifacts/vnext/integration_test_report.xml
          commands/tests/test_vnext.py
          commands/tests/test_vnext_contract_security.py
          commands/tests/test_vnext_data_audit.py
          commands/tests/test_vnext_providers.py
          commands/tests/test_vnext_target_weights.py
          commands/tests/test_vnext_vectorbt_adapter.py
          commands/tests/test_vnext_event_truth.py
          commands/tests/test_vnext_reconciliation.py
          commands/tests/test_vnext_domain_engine.py
          commands/tests/test_vnext_optimization.py
          commands/tests/test_vnext_ml_governance.py
          commands/tests/test_vnext_execution_certification.py
          commands/tests/test_vnext_review_orchestrator.py
          commands/tests/test_vnext_sbom.py
          commands/tests/test_vnext_ci_gate.py
          commands/tests/test_data_audit.py
          commands/tests/test_data_manager.py
          commands/tests/test_data_pipeline.py
          commands/tests/test_datahub_integrity.py
          commands/tests/test_datahub_architecture.py
          commands/tests/test_datahub_access.py
          commands/tests/test_live_snapshot_ingestion.py
          commands/tests/test_market_turnover_projection.py
          commands/tests/test_reference_ingestion.py
          commands/tests/test_intraday_monitor.py
          commands/tests/test_etf_dive_warning.py
          commands/tests/test_monitor_588710.py
          commands/tests/test_etf_holdings_ingestion.py
          commands/tests/test_dive_live_predictor_datahub.py
          commands/tests/test_corporate_event_ingestion.py
          commands/tests/test_regulatory_event_ingestion.py
          commands/tests/test_semiconductor_events.py
          commands/tests/test_benchmark_projection.py
          commands/tests/test_universes.py
          commands/tests/test_scheduling.py
          commands/tests/test_capability_status.py
          commands/tests/test_decision_ledger_archive.py
          commands/tests/test_backup_retention_safety.py
          commands/tests/test_risk_datahub_contract.py
          commands/tests/test_test_data_isolation.py
          commands/tests/test_routes_vnext.py
          commands/tests/test_routes_events.py
          commands/tests/test_routes_backtest_truth.py
          commands/tests/test_routes_auxiliary_truth.py
          commands/tests/test_decision_loop.py
          commands/tests/test_decision_loop_api.py
          commands/tests/test_decision_loop_production.py
          commands/tests/test_notification_transport.py
          commands/tests/test_legacy_notify_transport.py
          commands/tests/test_wechat_push_transport.py
          commands/tests/test_stock_card_transport.py
          commands/tests/test_shadow_pipeline.py
          commands/tests/test_shadow_forward.py
          commands/tests/test_shadow_forward_hardening.py
          commands/tests/test_shadow_forward_data_integrity.py
          commands/tests/test_factor_promotion_safety.py
          commands/tests/test_alpha_registry_concurrency.py
          commands/tests/test_llm_alpha_discovery.py
          commands/tests/test_alpha_promotion_retirement.py
          commands/tests/test_qmt_integration.py
          commands/tests/test_miniqmt_adapter.py

      - name: Python Ruff blocking gate
        shell: bash
        run: |
          mapfile -t changed_python < <(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.py')
          if ((${#changed_python[@]})); then
            ruff check --select E9,F63,F7,F82 "${changed_python[@]}"
          fi
          ruff check \
            commands/factor_lab/decision_loop \
            commands/factor_lab/vnext/event_truth_sources.py \
            commands/factor_lab/vnext/realized_observations.py \
            commands/scripts/decision_*.py \
            commands/scripts/ensure_ui_token.py \
            commands/scripts/generate_capability_status.py \
            commands/scripts/vnext_*.py \
            scripts/generate_hashed_lock.py

      - name: Generate CycloneDX SBOM
        env:
          PYTHONPATH: commands
        run: >-
          python -c "from pathlib import Path;
          from factor_lab.vnext.sbom import CycloneDXGenerator;
          CycloneDXGenerator().generate(Path('.'), output_path=Path('artifacts/vnext/sbom.cdx.json'))"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: commands/frontend/package-lock.json

      - name: Frontend exact install
        working-directory: commands/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: commands/frontend
        run: npm run lint

      - name: Frontend tests
        working-directory: commands/frontend
        run: npm run test

      - name: Frontend production build
        working-directory: commands/frontend
        run: npm run build

      - name: Upload acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-vnext-evidence
          path: |
            artifacts/vnext/integration_test_report.xml
            artifacts/vnext/sbom.cdx.json
            commands/frontend/dist
