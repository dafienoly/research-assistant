.layer-chart{height:160px}

const statItems = [

  ['0.0129', '平均 RankIC', 'gold'],
  ['0.07', 'ICIR', 'blue'],

];

// 筛选按钮

  '<button class="filter-btn active" onclick="filterFactors(\'all\')">全部</button>' +
  categories.map(c => `<button class="filter-btn" onclick="filterFactors('${c}')">${c}</button>`).join('');

let currentFilter = 'all';
function filterFactors(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderCards();
}

function grade(ic) {
  if (Math.abs(ic) >= 0.05) return 'A';
  if (Math.abs(ic) >= 0.03) return 'B';
  if (Math.abs(ic) >= 0.01) return 'C';
  return 'D';
}

function renderCards() {
  const container = document.getElementById('factorCards');
  const filtered = currentFilter === 'all' ? FACTORS : FACTORS.filter(f => f.category === currentFilter);
  
  container.innerHTML = filtered.map((f, idx) => {
    const icData = DAILY_IC[f.name] || [];
    const icVals = icData.map(d => d.ic);
    const latestIC = icVals.length ? icVals[icVals.length-1].toFixed(4) : '--';
    const meanIC = icVals.length ? (icVals.reduce((a,b)=>a+b,0)/icVals.length).toFixed(4) : '--';
    const g = grade(parseFloat(meanIC));
    const layer = LAYER_DATA[f.name] || {};
    const ls = layer.long_short_mean ? (layer.long_short_mean*100).toFixed(2) + '%' : '--';
    
    return '<div class="card">' +
      '<div class="card-header" onclick="toggleDetail('+idx+')" style="cursor:pointer">' +
      '<div><span class="card-title">'+f.name+'</span> <span class="badge badge-'+g+'">'+g+'级</span></div>' +
      '<span style="color:#8b949e;font-size:.85rem">'+f.category+' · IC:'+meanIC+' · 多空:'+ls+'</span>' +
      '</div>' +
      '<div class="card-body" id="detail-'+idx+'">' +
      '<div class="metrics-grid">' +
      '<div class="metric"><div class="metric-value">'+meanIC+'</div><div class="metric-label">平均 RankIC</div></div>' +
      '<div class="metric"><div class="metric-value">'+ls+'</div><div class="metric-label">多空收益</div></div>' +
      '<div class="metric"><div class="metric-value">'+f.layer_count+'</div><div class="metric-label">分层回测(天)</div></div>' +
      '</div>' +
      '<div class="chart-container"><canvas id="chart-'+idx+'"></canvas></div>' +
      '<p style="color:#8b949e;font-size:.85rem">'+f.description+'</p>' +
      '</div></div>';
  });
  
  // 画 IC 折线图
  filtered.forEach((f, idx) => {
    const icData = DAILY_IC[f.name] || [];
    if (!icData.length) return;
    const ctx = document.getElementById('chart-'+idx);
    if (!ctx) return;
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: icData.map(d => d.date.slice(5)),
        datasets: [{
          label: 'RankIC',
          data: icData.map(d => d.ic),
          borderColor: '#58a6ff',
          backgroundColor: 'rgba(56,139,253,0.1)',
          fill: true,
          pointRadius: 0,
          borderWidth: 1.5,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { display: false },
          y: { grid: { color: '#21262d' } }
        }
      }
    });
  });
}

function toggleDetail(idx) {
  const el = document.getElementById('detail-'+idx);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

renderCards();
