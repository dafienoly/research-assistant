# 半导体趋势跟随策略 — 通用 strategy schema 示例
# 这只是候选策略模板，不代表生产推荐
name: semiconductor_trend_following
version: 0.1.0
description: 半导体主题趋势跟随策略 — 用于验证 Strategy Lab 框架

universe:
  name: semiconductor_theme
  source:
    - tags/semiconductor_chain_tags.csv
    - tags/stock_theme_tags.csv
    - tags/industry_chain_tags.csv
  max_universe_size: 500

data_rules:
  adjusted_price_for_signal: true
  raw_price_for_execution_feasibility: true
  require_asof_date_for_fundamentals: true
  no_future_data: true

factors:
  - name: ret20
    category: price_momentum
    weight: 0.25
    params: {window: 20}
  - name: vol_ratio20
    category: volume
    weight: 0.15
    params: {window: 20, min_ratio: 1.2}
  - name: ma20_gt_ma60
    category: trend
    weight: 0.20
    params: {fast: 20, slow: 60}
  - name: quality_score
    category: fundamental_quality
    weight: 0.10
  - name: tag_score
    category: industry_theme
    weight: 0.15
  - name: risk_penalty
    category: risk_penalty
    weight: -0.15
    params: {max_ret20: 0.60, max_dist_ma20: 0.25}

signal_rules:
  buy_watch:
    final_score_gt: 60
    rank_top_n: 10
  exit_watch:
    close_lt_ma20: true
    final_score_lt: 40
  avoid:
    risk_penalty_gt: 40

portfolio:
  top_n: 10
  rebalance: daily
  initial_cash: 1000000
  max_single_weight: 0.15
  cash_buffer: 0.02
  lot_size: 100

cost:
  commission_rate: 0.0003
  min_commission: 5
  stamp_tax_rate_sell: 0.0005
  slippage_bps: 10

benchmark:
  primary: hs300
