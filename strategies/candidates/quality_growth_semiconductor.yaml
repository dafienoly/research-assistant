# 半导体质量成长策略 — 通用 strategy schema 示例
name: quality_growth_semiconductor
version: 0.1.0
description: 高ROE高增长的半导体股优选策略

universe:
  name: semiconductor_theme
  max_universe_size: 500

data_rules:
  no_future_data: true

factors:
  - name: ret20
    category: price_momentum
    weight: 0.10
  - name: vol_ratio20
    category: volume
    weight: 0.10
  - name: ma20_gt_ma60
    category: trend
    weight: 0.20

signal_rules:
  buy_watch:
    final_score_gt: 60
    rank_top_n: 8
  exit_watch:
    final_score_lt: 40

portfolio:
  top_n: 8
  rebalance: weekly
  initial_cash: 1000000
  max_single_weight: 0.15
  lot_size: 100

cost:
  commission_rate: 0.0003
  min_commission: 5
  stamp_tax_rate_sell: 0.0005
  slippage_bps: 10

benchmark:
  primary: hs300
